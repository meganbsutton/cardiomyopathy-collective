<!DOCTYPE html>

<head>

const { useState, useRef, useEffect } = React;

const C = {

  teal: "#1A7A8A",
  lightTeal: "#7ECAC0",

const f = "'Outfit', sans-serif";

const css = `
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

/* NAV */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [showEmail, setShowEmail] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const links = [
    { label: "Who We Are", id: "who" },
    { label: "The Challenge", id: "challenge" },
    { label: "Vision", id: "vision" },
    { label: "Approach", id: "approach" },
    { label: "How We Work", id: "how" },
  ];

  return (
    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? C.navy : "transparent",
      borderBottom: scrolled ? "1px solid rgba(255,255,255,0.06)" : "none",
      transition: "background 0.3s ease, border 0.3s ease",
      backdropFilter: scrolled ? "blur(12px)" : "none",
      fontFamily: f,
    }}>
      <div style={{
        maxWidth: 1100, margin: "0 auto", padding: "0 48px",
        height: 64, display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div
          onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
          style={{ cursor: "pointer", letterSpacing: -0.5 }}
        >
          <span style={{ fontSize: 16, fontWeight: 300, color: C.white }}>cardiomyopathy</span>
          <span style={{ fontSize: 16, fontWeight: 700, color: C.lightTeal }}>collective</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 28 }}>
          {links.map((l) => (
            <a
              key={l.id}
              href={`#${l.id}`}
              style={{
                fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.55)",
                textDecoration: "none", letterSpacing: 0.3,
                transition: "color 0.2s",
              }}
              onMouseEnter={(e) => e.target.style.color = C.lightTeal}
              onMouseLeave={(e) => e.target.style.color = "rgba(255,255,255,0.55)"}
            >{l.label}</a>
          ))}
          <div style={{ position: "relative" }}>
            <div
              onClick={() => setShowEmail(!showEmail)}
              style={{
                padding: "8px 20px", borderRadius: 6, background: C.teal,
                color: C.white, fontSize: 12, fontWeight: 700, cursor: "pointer",
              }}
            >Get in Touch</div>
            {showEmail && (
              <div style={{
                position: "absolute", top: "calc(100% + 10px)", right: 0,
                background: C.white, borderRadius: 10, padding: "20px 24px",
                boxShadow: "0 8px 32px rgba(0,0,0,0.25)",
                minWidth: 260, zIndex: 10,
              }}>
                <div style={{
                  position: "absolute", top: -7, right: 24,
                  width: 0, height: 0,
                  borderLeft: "7px solid transparent", borderRight: "7px solid transparent",
                  borderBottom: `7px solid ${C.white}`,
                }} />
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: C.sage, marginBottom: 10 }}>Contact</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.navy, marginBottom: 2 }}>Megan Sutton, DNP, ACNP</div>
                <div style={{ fontSize: 12, color: C.sage, marginBottom: 10 }}>President, HeartGene Sciences</div>
                <div
                  style={{ fontSize: 13, color: C.teal, fontWeight: 600, cursor: "pointer" }}
                  onClick={(e) => { e.stopPropagation(); navigator.clipboard.writeText("megan@heartgene.com"); }}

                <div style={{ fontSize: 9, color: C.sage, marginTop: 4, opacity: 0.6 }}>Click to copy</div>

        </div>
      </div>
    </nav>
  );
}

function WhoWeAre() {
  return (
    <div id="who" style={{ background: C.warmWhite, padding: "80px 48px", fontFamily: f }}>

        maxWidth: 800, margin: "0 auto", background: C.white,

      }}>

          fontSize: 12, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase",

        }}>Who We Are</div>
        <p style={{ fontSize: 28, fontWeight: 700, color: C.navy, lineHeight: 1.45, margin: "0 0 20px" }}>

function Challenge() {
  const barriers = [
    { label: "Mislabeled", stat: "56%", desc: "already in heart failure at time of cardiomyopathy diagnosis", ref: "1" },
    { label: "Misdiagnosed", stat: "51%", desc: "of ACM patients initially given a different diagnosis", ref: "2" },
    { label: "Delayed", stat: "8 yrs", desc: "median time to correct diagnosis for ACM", ref: "2" },
    { label: "Fragmented", stat: "64%", desc: "see multiple providers with no one connecting the dots", ref: "3" },
    { label: "Untested", stat: "<1%", desc: "receive guideline-recommended genetic testing", ref: "4" },
    { label: "Unidentified", stat: "85%", desc: "of people with HCM never clinically diagnosed", ref: "5" },
  ];

  return (
    <div id="challenge" style={{ background: C.blush, padding: "80px 48px", fontFamily: f }}>
      <div style={{
        maxWidth: 960, margin: "0 auto", background: C.warmWhite,

          color: C.crimson, marginBottom: 24,
        }}>The Challenge</div>

        <h2 style={{ fontSize: 34, fontWeight: 800, color: C.navy, lineHeight: 1.3, margin: "0 0 12px" }}>
          <span style={{ color: C.crimson }}>3.5 million</span> Americans are living with cardiomyopathy.
        </h2>
        <p style={{ fontSize: 16, color: C.sage, lineHeight: 1.6, margin: "0 0 48px", maxWidth: 600 }}>
          The diagnostic journey most patients face &#8212; barrier after barrier between symptoms and the right care.
        </p>

        <div style={{ position: "relative" }}>
          <div style={{
            position: "absolute", top: 32, left: 32, right: 24, height: 3,
            background: `linear-gradient(to right, ${C.teal}, ${C.crimson})`,
            borderRadius: 2,
          }} />
          <div style={{
            position: "absolute", top: 26, right: 12,
            width: 0, height: 0,
            borderTop: "8px solid transparent",
            borderBottom: "8px solid transparent",
            borderLeft: `10px solid ${C.crimson}`,
          }} />

          <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 0, position: "relative" }}>
            {barriers.map((b, i) => (
              <div key={i} style={{ textAlign: "center", padding: "0 4px" }}>
                <div style={{
                  fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase",
                  color: C.crimson, marginBottom: 12,

                <div style={{
                  width: 14, height: 14, borderRadius: "50%",
                  border: `3px solid ${i < 3 ? C.teal : C.crimson}`,
                  background: C.warmWhite,
                  margin: "0 auto 16px", position: "relative", zIndex: 1,
                }} />
                <div style={{ fontSize: 28, fontWeight: 900, color: C.navy, marginBottom: 6 }}>{b.stat}</div>
                <p style={{ fontSize: 11, color: C.sage, lineHeight: 1.4, margin: 0 }}>
                  {b.desc}<sup style={{ fontSize: 8, color: C.crimson, marginLeft: 2 }}>{b.ref}</sup>
                </p>
              </div>
            ))}
          </div>
        </div>

        <div style={{ textAlign: "center", marginTop: 48 }}>
          <p style={{ fontSize: 17, fontWeight: 700, color: C.navy, margin: 0 }}>
            This is where we are. <span style={{ color: C.crimson }}>This is why we&#8217;re here.</span>
          </p>
        </div>
      </div>
    </div>
  );
}

function Vision() {
  const flips = [
    { from: "Mislabeled", to: "Recognized" },
    { from: "Misdiagnosed", to: "Classified" },
    { from: "Delayed", to: "Caught early" },

  return (
    <div id="vision" style={{ background: C.ice, padding: "72px 48px", fontFamily: f }}>
      <div style={{ maxWidth: 800, margin: "0 auto" }}>

          fontSize: 12, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase",
          color: C.teal, marginBottom: 20,
        }}>The Vision</div>
        <h2 style={{ fontSize: 34, fontWeight: 800, color: C.navy, lineHeight: 1.3, margin: "0 0 36px" }}>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>

function Approach() {
  const steps = [
    { num: "01", label: "Recognize", desc: "Look beyond the heart failure label to identify patients who may have underlying cardiomyopathy." },
    { num: "02", label: "Define", desc: "Establish the specific cardiomyopathy phenotype and genetic status through comprehensive, guideline-based evaluation." },
    { num: "03", label: "Act", desc: "Deliver diagnosis-specific, guideline-directed care for patients and at-risk family members." },
  ];

  return (
    <div id="approach" style={{ background: C.white, padding: "80px 48px", fontFamily: f }}>
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
        <div style={{
          fontSize: 12, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase",
          color: C.teal, marginBottom: 20,
        }}>Our Approach</div>
        <h2 style={{ fontSize: 30, fontWeight: 800, color: C.navy, lineHeight: 1.35, margin: "0 0 8px" }}>

        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
