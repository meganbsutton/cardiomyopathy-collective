/* NAV */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [showEmail, setShowEmail] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? C.navy : "transparent",
      borderBottom: scrolled ? "1px solid rgba(255,255,255,0.06)" : "none",
      transition: "background 0.3s ease, border 0.3s ease",
      backdropFilter: scrolled ? "blur(12px)" : "none",
      fontFamily: f,
    }}>
      <div style={{
        maxWidth: 1100, margin: "0 auto", padding: "0 48px",
        height: 64, display: "flex", alignItems: "center", justifyContent: "space-between",
      }} className="nav-pad">
        <div
          onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
          style={{ cursor: "pointer", letterSpacing: -0.5 }}
        >
          <span style={{ fontSize: 16, fontWeight: 300, color: C.white }}>cardiomyopathy</span>
          <span style={{ fontSize: 16, fontWeight: 700, color: C.lightTeal }}>collective</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 28 }}>
          <div style={{ position: "relative" }}>
            <div
              onClick={() => setShowEmail(!showEmail)}
              style={{
                padding: "8px 20px", borderRadius: 6, background: C.crimson,
                color: C.white, fontSize: 12, fontWeight: 700, cursor: "pointer",
              }}
            >Join the Collective</div>
            {showEmail && (
              <div style={{
                position: "absolute", top: "calc(100% + 10px)", right: 0,
                background: C.white, borderRadius: 10, padding: "20px 24px",
                boxShadow: "0 8px 32px rgba(0,0,0,0.25)",
                minWidth: 260, zIndex: 10,
              }}>
                <div style={{
                  position: "absolute", top: -7, right: 24,
                  width: 0, height: 0,
                  borderLeft: "7px solid transparent", borderRight: "7px solid transparent",
                  borderBottom: `7px solid ${C.white}`,
                }} />
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: C.sage, marginBottom: 10 }}>Contact</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.navy, marginBottom: 2 }}>Megan Sutton, DNP, ACNP</div>
                <div style={{ fontSize: 12, color: C.sage, marginBottom: 10 }}>President, Heartgene Sciences</div>
                <div
                  style={{ fontSize: 13, color: C.teal, fontWeight: 600, cursor: "pointer" }}
                  onClick={(e) => { e.stopPropagation(); navigator.clipboard.writeText("megan@heartgene.com"); }}
                >megan@heartgene.com</div>
                <div style={{ fontSize: 9, color: C.sage, marginTop: 4, opacity: 0.6 }}>Click to copy</div>
              </div>
            )}
          </div>
        </div>
      </div>
    </nav>
  );
}

function Challenge() {
  const [active, setIdx] = useState(0);
  const [hovered, setHovered] = useState(null);

  const barriers = [
    { label: "Mislabeled", stat: "56%", desc: "already in heart failure at time of cardiomyopathy diagnosis", ref: "1" },
    { label: "Misdiagnosed", stat: "51%", desc: "of ACM patients initially given a different diagnosis", ref: "2" },
    { label: "Delayed", stat: "8 yrs", desc: "median time to correct diagnosis for ACM", ref: "2" },
    { label: "Fragmented", stat: "64%", desc: "see multiple providers before receiving a cardiomyopathy diagnosis", ref: "3" },
    { label: "Untested", stat: "1.1%", desc: "of eligible cardiomyopathy patients receive genetic testing", ref: "4" },
    { label: "Unidentified", stat: "85%", desc: "of people with HCM never clinically diagnosed", ref: "5" },
  ];

  const b = barriers[active];

  return (
    <div id="challenge" className="section-pad" style={{ background: C.blush, padding: "80px 48px", fontFamily: f }}>
      <style>{`
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .stat-row { cursor: pointer; transition: all 0.25s ease; }
        .stat-row:hover { background: rgba(255,255,255,0.7) !important; }
      `}</style>
      <div className="inner-box" style={{
        maxWidth: 960, margin: "0 auto", background: C.warmWhite,
        borderRadius: 12, padding: "56px 56px", borderLeft: `4px solid ${C.crimson}`,
      }}>
        <div style={{
          fontSize: 12, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase",
          color: C.crimson, marginBottom: 24,
        }}>The Challenge</div>

        <h2 className="section-heading" style={{ fontSize: 34, fontWeight: 800, color: C.navy, lineHeight: 1.3, margin: "0 0 12px" }}>
          <span style={{ color: C.crimson }}>3.5 million</span> Americans are living with cardiomyopathy.
        </h2>
        <p style={{ fontSize: 16, color: C.sage, lineHeight: 1.6, margin: "0 0 48px", maxWidth: 600 }}>
          At every stage of the care pathway, patients face barriers between symptoms and the right care.
        </p>

        <div className="ticker-layout" style={{ display: "grid", gridTemplateColumns: "260px 1fr", gap: 40 }}>
          <div>
            <div style={{
              fontSize: 9, fontWeight: 700, letterSpacing: 2.5, textTransform: "uppercase",
              color: C.sage, marginBottom: 12, paddingLeft: 20,
              display: "flex", alignItems: "center", gap: 8,
            }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.teal} strokeWidth="2" strokeLinecap="round">
                <polyline points="9 18 15 12 9 6" />
              </svg>
              Select to explore
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {barriers.map((b2, i) => {
                const isActive = active === i;
                const isHover = hovered === i;
                return (
                  <div
                    key={i}
                    className="stat-row"
                    onClick={() => setIdx(i)}
                    onMouseEnter={() => setHovered(i)}
                    onMouseLeave={() => setHovered(null)}
                    style={{
                      padding: "14px 16px",
                      borderLeft: isActive ? `4px solid ${C.crimson}` : "4px solid transparent",
                      background: isActive ? C.white : "transparent",
                      borderRadius: "0 8px 8px 0",
                      display: "flex", alignItems: "center", gap: 12,
                      boxShadow: isActive ? "0 2px 8px rgba(0,0,0,0.06)" : "none",
                    }}
                  >
                    <div style={{
                      width: 8, height: 8, borderRadius: "50%", flexShrink: 0,
                      background: isActive ? C.crimson : (isHover ? C.sage : "rgba(90,138,138,0.25)"),
                      transition: "all 0.25s",
                      animation: isActive ? "pulse 2s ease-in-out infinite" : "none",
                    }} />
                    <div style={{ flex: 1 }}>
                      <div style={{
                        fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase",
                        color: isActive ? C.crimson : (isHover ? C.navy : C.sage),
                        marginBottom: 2, transition: "color 0.25s",
                      }}>{b2.label}</div>
                      <div style={{
                        fontSize: 22, fontWeight: 900,
                        color: isActive ? C.navy : (isHover ? "rgba(15,43,60,0.5)" : "rgba(15,43,60,0.25)"),
                        transition: "color 0.25s",
                      }}>{b2.stat}</div>
                    </div>
                    {isActive && (
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.crimson} strokeWidth="2.5" strokeLinecap="round">
                        <polyline points="9 18 15 12 9 6" />
                      </svg>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{ display: "flex", gap: 6, marginTop: 16, paddingLeft: 20 }}>
              {barriers.map((_, i) => (
                <div
                  key={i}
                  onClick={() => setIdx(i)}
                  style={{
                    width: active === i ? 20 : 8, height: 8, borderRadius: 4,
                    background: active === i ? C.crimson : "rgba(0,0,0,0.1)",
                    transition: "all 0.3s", cursor: "pointer",
                  }}
                />
              ))}
            </div>
          </div>

          <div style={{
            background: C.navy, borderRadius: 12,
            padding: "48px 40px", display: "flex",
            flexDirection: "column", justifyContent: "center",
            position: "relative", overflow: "hidden",
          }}>
            <div style={{
              position: "absolute", right: -12, bottom: -20,
              fontSize: 160, fontWeight: 900, color: "rgba(255,255,255,0.04)",
              lineHeight: 1, whiteSpace: "nowrap",
            }}>{b.stat}</div>

            <div style={{ position: "relative", zIndex: 1 }}>
              <div style={{
                fontSize: 11, fontWeight: 800, letterSpacing: 3, textTransform: "uppercase",
                color: C.lightTeal, marginBottom: 20,
              }}>{b.label}</div>
              <div style={{
                fontSize: 72, fontWeight: 900, color: C.white,
                lineHeight: 1, marginBottom: 16,
              }}>{b.stat}</div>
              <p style={{ fontSize: 16, color: "rgba(255,255,255,0.6)", lineHeight: 1.6, margin: 0, maxWidth: 360 }}>
                {b.desc}<sup style={{ fontSize: 10, color: C.lightTeal, marginLeft: 3 }}>{b.ref}</sup>
              </p>
              <div style={{
                marginTop: 28, fontSize: 11, color: "rgba(255,255,255,0.25)", fontWeight: 600,
              }}>
                {active + 1} of {barriers.length}
              </div>
            </div>
          </div>
        </div>

        <div className="ticker-mobile" style={{ display: "none" }}>
          {barriers.map((b2, i) => (
            <div key={i} style={{
              background: C.white, borderRadius: 10, padding: "20px",
              borderLeft: `4px solid ${C.crimson}`, marginBottom: 12,
            }}>
              <div style={{
                fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase",
                color: C.crimson, marginBottom: 8,
              }}>{b2.label}</div>
              <div style={{ fontSize: 32, fontWeight: 900, color: C.navy, marginBottom: 8, lineHeight: 1 }}>{b2.stat}</div>
              <p style={{ fontSize: 13, color: C.sage, lineHeight: 1.5, margin: 0 }}>
                {b2.desc}<sup style={{ fontSize: 8, color: C.crimson, marginLeft: 2 }}>{b2.ref}</sup>
              </p>
            </div>
          ))}
        </div>

        <div style={{ textAlign: "center", marginTop: 48 }}>
          <p style={{ fontSize: 17, fontWeight: 700, color: C.navy, margin: 0 }}>
            This is where we are. <span style={{ color: C.crimson }}>This is why we&#8217;re here.</span>
          </p>
        </div>
      </div>
    </div>
  );
}

function Vision() {
  const flips = [
    { from: "Mislabeled", to: "Recognized" },
    { from: "Misdiagnosed", to: "Classified" },
    { from: "Delayed", to: "Caught early" },
    { from: "Fragmented", to: "Coordinated" },
    { from: "Untested", to: "Tested" },
    { from: "Unidentified", to: "Found" },
  ];

  return (
    <div id="vision" className="section-pad" style={{ background: C.ice, padding: "72px 48px", fontFamily: f }}>
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
        <div style={{
          fontSize: 12, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase",
          color: C.teal, marginBottom: 20,
        }}>The Vision</div>
        <h2 style={{ fontSize: 34, fontWeight: 800, color: C.navy, lineHeight: 1.3, margin: "0 0 36px" }}>
          A different journey is possible.
        </h2>
        <div className="flip-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
          {flips.map((fl, i) => (
            <div key={i} style={{
              padding: "20px 22px", borderRadius: 8, background: C.white,
              borderLeft: `4px solid ${C.teal}`, boxShadow: "0 2px 8px rgba(0,0,0,0.04)",
            }}>
              <div style={{
                fontSize: 12, fontWeight: 700, color: C.crimson, marginBottom: 12,
                textDecoration: "line-through", textDecorationColor: C.crimson,
                textDecorationThickness: "2px", letterSpacing: 1, textTransform: "uppercase",
              }}>{fl.from}</div>
              <div style={{ display: "flex", alignItems: "center" }}>
                <span style={{ fontSize: 15, color: C.teal, fontWeight: 700, marginRight: 6 }}>&#10003;</span>
                <span style={{ fontSize: 17, fontWeight: 700, color: C.teal }}>{fl.to}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Approach() {
  const steps = [
    { num: "01", label: "Recognize", desc: "Look beyond the heart failure label to identify patients who may have underlying cardiomyopathy." },
    { num: "02", label: "Define", desc: "Establish the specific cardiomyopathy phenotype and genetic status through comprehensive, guideline-based evaluation." },
    { num: "03", label: "Act", desc: "Deliver diagnosis-specific, guideline-directed care for patients and at-risk family members." },
  ];

  return (
    <div id="approach" className="section-pad" style={{ background: C.white, padding: "80px 48px", fontFamily: f }}>
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
        <div style={{
          fontSize: 12, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase",
          color: C.teal, marginBottom: 20,
        }}>Our Approach</div>
        <h2 className="section-heading" style={{ fontSize: 30, fontWeight: 800, color: C.navy, lineHeight: 1.35, margin: "0 0 8px" }}>
          Empowering patients and providers across the care pathway.
        </h2>
        <p style={{ fontSize: 15, color: C.sage, margin: "0 0 48px", maxWidth: 580, lineHeight: 1.6 }}>
          Aligned with leading cardiovascular guidelines, the Collective supports a structured three-step approach to care.
        </p>

        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {steps.map((s, i) => {
            const stepColor = [C.navy, C.teal, C.crimson][i];
            return (
            <div key={i} className="approach-card" style={{
              background: C.bone, borderRadius: 10,
              borderLeft: `5px solid ${stepColor}`,
              display: "grid", gridTemplateColumns: "280px 1fr",
              alignItems: "center", minHeight: 110,
            }}>
              <div className="approach-label" style={{ padding: "28px 0 28px 32px" }}>
                <div style={{
                  fontSize: 14, fontWeight: 700,
                  color: stepColor, marginBottom: 4,
                }}>{s.num}</div>
                <div style={{
                  fontSize: 46, fontWeight: 800, color: stepColor,
                  opacity: 0.35, lineHeight: 1, letterSpacing: -1,
                }}>{s.label}</div>
              </div>
              <div className="approach-desc" style={{
                padding: "28px 36px 28px 32px",
                borderLeft: "1px solid rgba(90,138,138,0.18)",
                alignSelf: "stretch", display: "flex", alignItems: "center",
              }}>
                <p style={{
                  fontSize: 15, color: C.navy, lineHeight: 1.6, margin: 0,
                  fontWeight: 500, opacity: 0.85,
                }}>{s.desc}</p>
              </div>
            </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

    <div id="how" className="section-pad" style={{ background: C.navyGhost, padding: "80px 48px", fontFamily: f }}>
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
